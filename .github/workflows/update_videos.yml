name: Atualizar Vídeos do YouTube

on:
  schedule:
    - cron: '*/10 * * * *' # Roda a cada 6 horas automaticamente
  workflow_dispatch: # Permite que você rode o script manualmente com um botão no GitHub

jobs:
  update-videos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
          
      - name: Instalar bibliotecas
        run: pip install google-api-python-client
        
      - name: Buscar Vídeos
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python fetch_videos.py
        
      - name: Commitar e Salvar o videos.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add videos.json
          git commit -m "🤖 Atualizando lista de vídeos" || echo "Sem mudanças para commitar"
          git push
