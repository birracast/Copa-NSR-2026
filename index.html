<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BolãoCopa — FIFA World Cup 26™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --red:    #E61D25;
  --blue:   #2A398D;
  --green:  #3CAC3B;
  --gold:   #C9A84C;
  --gold2:  #F0C040;
  --black:  #0D0D0D;
  --dark:   #121212;
  --dark2:  #1A1A1A;
  --dark3:  #222222;
  --dark4:  #2C2C2C;
  --border: #333333;
  --text:   #F0F0F0;
  --muted:  #888888;
  --radius: 12px;
  --shadow: 0 8px 40px rgba(0,0,0,0.7);
  --font-display: 'Barlow Condensed', sans-serif;
  --font-body: 'Barlow', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--black);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  background-image:
    radial-gradient(ellipse 100% 60% at 50% 0%, rgba(42,57,141,0.15) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 10% 80%, rgba(60,172,59,0.08) 0%, transparent 50%),
    radial-gradient(ellipse 50% 30% at 90% 70%, rgba(230,29,37,0.08) 0%, transparent 50%);
}
.hidden { display: none !important; }
#app { min-height: 100vh; }

/* ===== LOADING OVERLAY ===== */
#loading-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: linear-gradient(rgba(13, 13, 13, 0.7), rgba(13, 13, 13, 0.7)), url('entrada.gif') center center no-repeat;
  background-size: cover;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
}
.loading-trophy { font-size: 64px; animation: pulse 1.2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.1);opacity:.7} }
.loading-text { font-family: var(--font-display); font-size: 20px; font-weight: 700; letter-spacing: 3px; color: var(--text); text-transform: uppercase; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }
.loading-spin { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.2); border-top-color: var(--gold); border-radius: 50%; animation: spin .8s linear infinite; }

/* ===== HEADER ===== */
header {
  position: sticky; top: 0; z-index: 200;
  background: rgba(13,13,13,0.95);
  backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
}
.header-top {
  display: flex; align-items: center; gap: 16px;
  padding: 12px 24px; max-width: 1300px; margin: 0 auto;
}
.logo-wrap { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.logo-bolao { font-family: var(--font-display); font-size: 11px; font-weight: 600; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; }

.nav-tabs { display: flex; gap: 2px; margin-left: auto; flex-wrap: wrap; }
.nav-tab {
  font-family: var(--font-display); font-size: 15px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  padding: 8px 18px; border-radius: 8px; border: none;
  background: none; color: var(--muted); cursor: pointer; transition: .2s;
  display: flex; align-items: center; gap: 6px;
}
.nav-tab:hover { color: var(--text); background: var(--dark3); }
.nav-tab.active { background: var(--dark3); color: var(--text); border-bottom: 2px solid var(--gold); border-radius: 8px 8px 0 0; }
.nav-tab.admin-tab { color: #ff9a9a; }
.nav-tab.admin-tab.active { border-bottom-color: var(--red); }

.nav-user { display: flex; align-items: center; gap: 10px; margin-left: 16px; }
.nav-avatar { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; background: var(--dark3); cursor: pointer; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.nav-name { font-size: 14px; font-weight: 600; color: var(--text); }
.nav-pts  { font-family: var(--font-display); font-size: 16px; font-weight: 800; color: var(--gold); }
.btn-logout { border: 1px solid var(--border); background: none; border-radius: 8px; padding: 7px 14px; color: var(--muted); font-family: var(--font-body); font-size: 13px; cursor: pointer; transition: .2s; }
.btn-logout:hover { border-color: var(--red); color: var(--red); }
.flag-stripe { height: 4px; background: linear-gradient(90deg, var(--red) 33.3%, var(--blue) 33.3% 66.6%, var(--green) 66.6%); }

/* ===== AUTH ===== */
.auth-screen {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 32px 16px;
  background-image: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(42,57,141,0.25) 0%, transparent 60%);
}
.auth-card {
  width: 100%; max-width: 440px;
  background: var(--dark2); border: 1px solid var(--border);
  border-radius: 20px; padding: 40px 36px;
  box-shadow: var(--shadow); position: relative; overflow: hidden;
}
.auth-card::before { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--red), var(--blue), var(--green)); }
.auth-logo { text-align: center; margin-bottom: 32px; }
.auth-title { font-family: var(--font-display); font-size: 42px; font-weight: 900; letter-spacing: 2px; line-height: 1; }
.auth-title .t1 { color: var(--text); }
.auth-title .t2 { background: linear-gradient(90deg, var(--red), var(--blue), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.auth-sub { font-size: 13px; color: var(--muted); margin-top: 4px; letter-spacing: 1px; }

.tabs-row { display: flex; gap: 0; background: var(--dark3); border-radius: 10px; padding: 4px; margin-bottom: 24px; }
.tab-btn { flex: 1; padding: 9px; border: none; border-radius: 8px; background: none; color: var(--muted); font-family: var(--font-display); font-size: 16px; font-weight: 700; letter-spacing: 1px; cursor: pointer; transition: .2s; }
.tab-btn.active { background: var(--dark); color: var(--gold); }

.fgroup { margin-bottom: 16px; }
.flabel { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 6px; }
.finput { width: 100%; padding: 12px 16px; background: var(--dark3); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: var(--font-body); font-size: 15px; outline: none; transition: .2s; }
.finput:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(42,57,141,0.2); }

.avatar-area { border: 2px dashed var(--border); border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; transition: .2s; position: relative; }
.avatar-area:hover { border-color: var(--gold); }
.avatar-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.avatar-preview-img { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; border: 3px solid var(--gold); margin: 0 auto 8px; display: block; }

.btn-main { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--blue), #1e2a6e); border: none; border-radius: 12px; color: #fff; font-family: var(--font-display); font-size: 20px; font-weight: 700; letter-spacing: 1px; cursor: pointer; transition: .2s; box-shadow: 0 4px 20px rgba(42,57,141,0.4); }
.btn-main:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(42,57,141,0.5); }
.btn-main:disabled { opacity: .5; cursor: not-allowed; transform: none; }

.err-msg { background: rgba(230,29,37,0.1); border: 1px solid rgba(230,29,37,0.3); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #ff7b7b; margin-bottom: 14px; }
.ok-msg  { background: rgba(60,172,59,0.1);  border: 1px solid rgba(60,172,59,0.3);  border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #7de87c; margin-bottom: 14px; }
.warn-msg{ background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.3); border-radius: 8px; padding: 12px 16px; font-size: 14px; color: var(--gold); margin-bottom: 16px; }

/* ===== MAIN CONTENT ===== */
.main-wrap { max-width: 1300px; margin: 0 auto; padding: 28px 20px; }

/* ===== SYNC BAR & STATS ===== */
.sync-bar { background: var(--dark2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 20px; display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.sync-dot  { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: blink 2s infinite; flex-shrink: 0; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.sync-text { flex: 1; font-size: 13px; color: var(--muted); }
.sync-text strong { color: var(--green); }
.sync-btn  { border: 1px solid var(--border); background: none; border-radius: 8px; padding: 6px 14px; color: var(--text); font-size: 13px; cursor: pointer; transition: .2s; }
.sync-btn:hover { border-color: var(--green); color: var(--green); }
.sync-saving { color: var(--gold); font-size: 13px; display: flex; align-items: center; gap: 6px; }

.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 28px; }
.stat-box { background: var(--dark2); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 16px; text-align: center; transition: .2s; }
.stat-box:hover { border-color: var(--dark4); transform: translateY(-2px); }
.stat-box .sv { font-family: var(--font-display); font-size: 38px; font-weight: 800; line-height: 1; }
.stat-box .sl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-top: 4px; }
.sv.gold { color: var(--gold); } .sv.blue { color: #7b8fe8; } .sv.green { color: var(--green); } .sv.red { color: #ff7b7b; }

/* ===== VIEW SELECTOR ===== */
.view-selector { display: flex; gap: 8px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
.user-chip { display: flex; align-items: center; gap: 7px; border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; cursor: pointer; transition: .2s; background: var(--dark2); font-size: 14px; font-weight: 500; }
.user-chip:hover { border-color: var(--blue); }
.user-chip.active { border-color: var(--gold); background: rgba(201,168,76,0.1); color: var(--gold); }
.user-chip-avatar { width: 22px; height: 22px; border-radius: 50%; object-fit: cover; background: var(--dark3); display: flex; align-items: center; justify-content: center; font-size: 12px; overflow: hidden; flex-shrink: 0; }
.user-chip-avatar img { width: 100%; height: 100%; object-fit: cover; }

/* ===== PHASE HEADER ===== */
.phase-hdr { display: flex; align-items: center; gap: 14px; margin: 28px 0 14px; }
.phase-hdr-text { font-family: var(--font-display); font-size: 22px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
.phase-hdr::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--border), transparent); }
.phase-pill { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; letter-spacing: 1px; text-transform: uppercase; }
.phase-pill.groups  { background: rgba(42,57,141,0.2);  color: #7b8fe8; border: 1px solid rgba(42,57,141,0.3); }
.phase-pill.knockout{ background: rgba(230,29,37,0.15); color: #ff7b7b; border: 1px solid rgba(230,29,37,0.25); }
.phase-pill.final   { background: rgba(201,168,76,0.15); color: var(--gold); border: 1px solid rgba(201,168,76,0.25); }
.phase-pill.admin-pill { background: rgba(230,29,37,0.2); color: #ff7b7b; border: 1px solid rgba(230,29,37,0.3); }

/* ===== GAME CARDS (NOVO LAYOUT DE LISTA UNIFICADA) ===== */
.games-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
.game-card { background: var(--dark2); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; position: relative; overflow: hidden; transition: .25s; }
.game-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--border); transition: .25s; }
.game-card:hover { border-color: var(--dark4); }
.game-card.exact::before   { background: linear-gradient(90deg, var(--green), #7de87c); }
.game-card.result-ok::before { background: linear-gradient(90deg, var(--blue), #7b8fe8); }
.game-card.wrong::before   { background: linear-gradient(90deg, var(--red), #ff7b7b); }
.game-card.locked { opacity: .85; }

.gcard-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.gcard-round { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.gcard-date { font-size: 11px; color: var(--muted); }
.status-pill { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 6px; }
.status-pill.live     { background: rgba(230,29,37,0.2);  color: #ff7b7b; animation: blink 1s infinite; }
.status-pill.finished { background: rgba(60,172,59,0.15);  color: var(--green); }
.status-pill.upcoming { background: rgba(201,168,76,0.1);  color: var(--gold); }
.status-pill.soon     { background: rgba(230,29,37,0.15); color: #ff9a9a; animation: blink 1.5s infinite; }

.teams-section { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 14px; max-width: 600px; margin-left: auto; margin-right: auto; }
.team-col { flex: 1; text-align: center; }
.team-flag { font-size: 40px; line-height: 1; display: block; margin-bottom: 4px; }
.team-code { font-family: var(--font-display); font-size: 18px; font-weight: 700; letter-spacing: 1px; }
.center-col { flex-shrink: 0; text-align: center; min-width: 100px; }
.real-score { font-family: var(--font-display); font-size: 34px; font-weight: 800; color: var(--gold); letter-spacing: 2px; line-height: 1; }
.vs-label { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--dark4); }
.venue-text { font-size: 11px; color: var(--muted); margin-top: 4px; }

/* ===== GAME BETS LIST ===== */
.game-bets-list { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; border-top: 1px solid var(--border); padding-top: 16px; }
.gbet-row { display: flex; align-items: center; gap: 12px; background: var(--dark3); padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); transition: 0.2s; }
.gbet-row.highlighted { background: rgba(60,172,59,0.15); border-color: var(--green); }
.gbet-av { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; background: var(--dark4); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; overflow: hidden; border: 1px solid var(--border); }
.gbet-info { flex: 1; min-width: 0; }
.gbet-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.gbet-score { font-family: var(--font-display); font-size: 20px; font-weight: 800; color: var(--gold); white-space: nowrap; }
.gbet-actions { display: flex; gap: 6px; align-items: center; }
.gbet-score-inputs { display: flex; align-items: center; gap: 6px; }
.gbet-inp { width: 44px; height: 44px; text-align: center; background: var(--dark4); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--font-display); font-size: 22px; font-weight: 800; outline: none; transition: .2s; }
.gbet-inp:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(42,57,141,0.2); }
.gbet-inp:disabled { opacity: 0.6; cursor: not-allowed; }
.gbet-badge-result { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-top: 4px; }

/* ===== RANKING & GROUPS ===== */
.rank-table { display: flex; flex-direction: column; gap: 8px; }
.rank-row { background: var(--dark2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 20px; display: flex; align-items: center; gap: 16px; transition: .2s; }
.rank-row:hover { border-color: var(--dark4); }
.rank-row.me { border-color: var(--gold); background: rgba(201,168,76,0.05); }
.rank-row.p1 { border-color: var(--gold); background: rgba(201,168,76,0.08); }
.rank-row.p2 { border-color: #b0bec5; } .rank-row.p3 { border-color: #cd7f32; }

.data-panel { background: var(--dark2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 18px; }
.groups-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 16px; }
.group-card { background: var(--dark2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.group-card-head { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.group-title { font-family: var(--font-display); font-size: 24px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--gold); }
.standings-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.standings-table th { color: var(--muted); font-size: 10px; text-transform: uppercase; padding: 10px 6px; border-bottom: 1px solid var(--border); text-align: center; }
.standings-table td { padding: 9px 6px; border-bottom: 1px solid rgba(255,255,255,0.04); text-align: center; }
.standings-table .team-td { text-align: left; min-width: 140px; }
.team-line { display: flex; align-items: center; gap: 8px; min-width: 0; }
.points-cell { font-family: var(--font-display); font-size: 18px; font-weight: 800; color: var(--gold); }
.group-games { border-top: 1px solid var(--border); padding: 12px; display: flex; flex-direction: column; gap: 8px; }
.group-game-row { display: grid; grid-template-columns: 68px minmax(0, 1fr) 44px minmax(0, 1fr); gap: 8px; align-items: center; padding: 8px 10px; background: var(--dark3); border-radius: 8px; }

/* ===== SETTINGS, PROFILE, ADMIN ===== */
.settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
.set-card { background: var(--dark2); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
.set-card h3 { font-family: var(--font-display); font-size: 20px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--gold); margin-bottom: 18px; }

.profile-layout { display: grid; grid-template-columns: 260px 1fr; gap: 20px; }
.profile-card { background: var(--dark2); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; text-align: center; }
.profile-av-wrap { position: relative; display: inline-block; margin-bottom: 14px; }
.profile-av { width: 96px; height: 96px; border-radius: 50%; border: 3px solid var(--gold); background: var(--dark3); display: block; font-size: 42px; line-height: 96px; text-align: center; overflow: hidden; }
.profile-uname { font-family: var(--font-display); font-size: 24px; font-weight: 800; letter-spacing: 1px; margin-bottom: 4px; }

.admin-table { width: 100%; border-collapse: collapse; }
.admin-table th { text-align: left; padding: 10px 12px; font-size: 11px; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); font-weight: 600; }
.admin-table td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 13px; vertical-align: middle; }

/* ===== HELP ===== */
.help-hero { background: linear-gradient(135deg, rgba(42,57,141,0.2), rgba(60,172,59,0.1)); border: 1px solid var(--border); border-radius: 20px; padding: 40px; margin-bottom: 32px; text-align: center; }
.help-hero h1 { font-family: var(--font-display); font-size: 48px; font-weight: 900; letter-spacing: 2px; margin-bottom: 12px; }
.help-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 32px; }
.help-card { background: var(--dark2); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; }
.help-card-icon { font-size: 40px; margin-bottom: 14px; }
.help-card h3 { font-family: var(--font-display); font-size: 20px; font-weight: 800; letter-spacing: 1px; margin-bottom: 12px; color: var(--gold); }
.help-card p, .help-card li { font-size: 14px; color: var(--muted); line-height: 1.7; }

/* ===== MODALS & TOASTS ===== */
.modal-overlay { position: fixed; inset: 0; z-index: 500; background: rgba(0,0,0,.7); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal-box { background: var(--dark2); border: 1px solid var(--border); border-radius: 20px; padding: 36px 32px; max-width: 440px; width: 100%; text-align: center; box-shadow: var(--shadow); }
.modal-icon { font-size: 52px; margin-bottom: 14px; }
.modal-title { font-family: var(--font-display); font-size: 28px; font-weight: 800; letter-spacing: 1px; margin-bottom: 10px; }
.modal-msg { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 24px; }
.modal-close { padding: 12px 32px; background: var(--blue); border: none; border-radius: 10px; color: #fff; font-family: var(--font-display); font-size: 18px; font-weight: 700; cursor: pointer; transition: .2s; }
.modal-close:hover { background: #1e2a6e; }

.toast-wrap { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.toast { background: var(--dark2); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; min-width: 220px; display: flex; align-items: center; gap: 10px; font-size: 14px; box-shadow: var(--shadow); animation: toastIn .3s ease; pointer-events: all; }
.toast.ok   { border-color: rgba(60,172,59,0.4); }
.toast.err  { border-color: rgba(230,29,37,0.4); }
.toast.info { border-color: rgba(42,57,141,0.4); }
.toast.warn { border-color: rgba(201,168,76,0.4); }
@keyframes toastIn  { from { transform: translateX(100%); opacity: 0; } to { transform: none; opacity: 1; } }
@keyframes toastOut { from { opacity: 1; } to { transform: translateX(100%); opacity: 0; } }

/* ===== EXTRAS ===== */
.chip-com-foto { animation: entradaChip 0.6s ease-out forwards, flutuarChip 3s ease-in-out infinite 0.6s; border-color: var(--gold) !important; box-shadow: 0 4px 12px rgba(201, 168, 76, 0.15); }
@keyframes entradaChip { 0% { transform: translateY(15px) scale(0.8); opacity: 0; } 70% { transform: translateY(-3px) scale(1.03); opacity: 0.9; } 100% { transform: translateY(0) scale(1); opacity: 1; } }
@keyframes flutuarChip { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

.rank-dual { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.rank-col-header { font-family: var(--font-display); font-size: 18px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; padding: 12px 18px; border-radius: 10px 10px 0 0; display: flex; align-items: center; gap: 10px; margin-bottom: 0; }
.rank-col-header.pontos  { background: linear-gradient(135deg, rgba(201,168,76,0.2), rgba(201,168,76,0.05)); border: 1px solid rgba(201,168,76,0.3); color: var(--gold); border-bottom: none; }
.rank-col-header.piratecas { background: linear-gradient(135deg, rgba(230,29,37,0.15), rgba(230,29,37,0.03)); border: 1px solid rgba(230,29,37,0.3); color: #ff7b7b; border-bottom: none; }
.rank-col-body { display: flex; flex-direction: column; gap: 6px; border: 1px solid var(--border); border-radius: 0 0 10px 10px; padding: 10px; background: var(--dark2); }
.rank-row-mini { background: var(--dark3); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; transition: .2s; }
.rank-row-mini:hover { border-color: var(--dark4); }
.rank-row-mini.me { border-color: var(--gold); background: rgba(201,168,76,0.07); }
.rank-row-mini.p1 { border-color: var(--gold); background: rgba(201,168,76,0.1); }
.rank-row-mini.p2 { border-color: #b0bec5; }
.rank-row-mini.p3 { border-color: #cd7f32; }
.rank-mini-num { font-family: var(--font-display); font-size: 24px; font-weight: 800; min-width: 36px; text-align: center; }
.rank-mini-num.n1 { color: var(--gold); text-shadow: 0 0 12px rgba(201,168,76,0.5); }
.rank-mini-num.n2 { color: #b0bec5; }
.rank-mini-num.n3 { color: #cd7f32; }
.rank-mini-av { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--border); overflow: hidden; background: var(--dark4); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.rank-mini-av img { width: 100%; height: 100%; object-fit: cover; }
.rank-mini-info { flex: 1; min-width: 0; }
.rank-mini-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rank-mini-pts { text-align: right; flex-shrink: 0; }
.rank-mini-pts-val { font-family: var(--font-display); font-size: 24px; font-weight: 800; line-height: 1; }
.rank-mini-pts-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; }
.rank-mini-pts-val.gold { color: var(--gold); }
.rank-mini-pts-val.red  { color: #ff7b7b; }

.highlights-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 18px; }
.highlight-card { background: var(--dark2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: .25s; position: relative; }
.highlight-card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.5); }
.hl-label-row { display: flex; gap: 8px; align-items: center; padding: 12px 14px 8px; }
.hl-badge { font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 20px; letter-spacing: 1px; text-transform: uppercase; }
.hl-badge.quente   { background: rgba(60,172,59,0.2);  color: var(--green); border: 1px solid rgba(60,172,59,0.3); }
.hl-badge.frio     { background: rgba(230,29,37,0.15); color: #ff7b7b; border: 1px solid rgba(230,29,37,0.25); }
.hl-badge.meio     { background: rgba(201,168,76,0.15); color: var(--gold); border: 1px solid rgba(201,168,76,0.25); }
.hl-badge.rodada   { background: rgba(42,57,141,0.2);  color: #7b8fe8; border: 1px solid rgba(42,57,141,0.3); }
.hl-badge.jogo     { background: rgba(201,168,76,0.1); color: var(--gold); border: 1px solid rgba(201,168,76,0.2); }
.hl-canvas-wrap { position: relative; width: 100%; aspect-ratio: 1; background: var(--dark3); cursor: pointer; }
.hl-canvas-wrap canvas { width: 100%; height: 100%; display: block; }
.hl-share-btn { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 6px 14px; color: #fff; font-size: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: .2s; backdrop-filter: blur(4px); }
.hl-share-btn:hover { background: rgba(37,211,102,0.8); border-color: transparent; }
.hl-info { padding: 10px 14px 14px; }
.hl-user-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
.hl-user-av { width: 28px; height: 28px; border-radius: 50%; overflow: hidden; background: var(--dark3); display: flex; align-items: center; justify-content: center; font-size: 14px; border: 1px solid var(--border); flex-shrink: 0; }
.hl-user-av img { width: 100%; height: 100%; object-fit: cover; }
.hl-user-name { font-size: 13px; font-weight: 600; }
.hl-user-pts { font-family: var(--font-display); font-size: 20px; font-weight: 800; color: var(--gold); margin-left: auto; }
.hl-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.hl-tab { font-family: var(--font-display); font-size: 14px; font-weight: 700; padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--dark2); color: var(--muted); cursor: pointer; transition: .2s; }
.hl-tab.active { background: var(--dark3); color: var(--text); border-color: var(--gold); }
.hl-empty { color: var(--muted); font-size: 14px; text-align: center; padding: 40px; }

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .header-top { flex-wrap: wrap; justify-content: space-between; padding: 12px 16px 0; }
  .logo-wrap { order: 1; }
  .nav-user { order: 2; margin-left: 0; }
  .nav-tabs { order: 3; width: 100%; flex-wrap: nowrap; overflow-x: auto; gap: 6px; margin-top: 16px; padding-bottom: 2px; -ms-overflow-style: none; scrollbar-width: none; }
  .nav-tabs::-webkit-scrollbar { display: none; }
  .nav-tab { white-space: nowrap; font-size: 13px; padding: 10px 14px; }
  .rank-dual { grid-template-columns: 1fr; }
  .main-wrap { padding: 16px; }
  .groups-grid { grid-template-columns: 1fr; }
  .group-game-row { grid-template-columns: 58px minmax(0, 1fr) 38px minmax(0, 1fr); font-size: 12px; }
  .settings-grid { grid-template-columns: 1fr; }
  .profile-layout { grid-template-columns: 1fr; }
  .help-grid { grid-template-columns: 1fr; }
  .logo-bolao { display: none; }
}
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--black); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Botões pequenos adicionais */
.btn-sm { padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border); background: none; color: var(--text); font-size: 12px; cursor: pointer; transition: .2s; }
.btn-sm:hover { background: var(--dark3); }
.btn-gold { padding: 10px 20px; border: 1px solid rgba(201,168,76,0.3); background: rgba(201,168,76,0.1); border-radius: 10px; color: var(--gold); font-family: var(--font-display); font-size: 16px; font-weight: 700; letter-spacing: 1px; cursor: pointer; transition: .2s; }
.btn-gold:hover { background: rgba(201,168,76,0.2); }
.btn-red { padding: 10px 20px; border: 1px solid rgba(230,29,37,0.3); background: rgba(230,29,37,0.1); border-radius: 10px; color: #ff7b7b; font-family: var(--font-display); font-size: 14px; font-weight: 700; letter-spacing: 1px; cursor: pointer; transition: .2s; }
.btn-red:hover { background: rgba(230,29,37,0.2); }
</style>
