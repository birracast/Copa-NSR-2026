<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <title>Corrida do Bolão</title>
    <style>
        /* Importe as mesmas variáveis do seu index para manter a identidade */
        :root { --gold: #C9A84C; --black: #0D0D0D; --dark2: #1A1A1A; --text: #F0F0F0; }
        body { background: var(--black); color: var(--text); font-family: 'Barlow', sans-serif; padding: 20px; }
        .controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        button { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        select { background: #333; color: white; padding: 10px; border-radius: 8px; border: none; }
        #chart-container { position: relative; height: 500px; margin-top: 20px; }
        .bar-wrapper { position: absolute; left: 0; width: 100%; height: 55px; transition: transform 0.6s ease-in-out; display: flex; align-items: center; }
        .bar { height: 45px; border-radius: 22px; display: flex; align-items: center; padding: 0 10px; transition: width 0.6s ease-in-out; justify-content: space-between; }
        .avatar { width: 35px; height: 35px; border-radius: 50%; background: #000; margin-right: 10px; border: 2px solid #fff; }
        .info-game { font-size: 12px; color: #ccc; margin-left: 10px; white-space: nowrap; }
    </style>
</head>
