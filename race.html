<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Corrida do Bolão</title>
    <style>
        :root { --gold: #C9A84C; --black: #0D0D0D; --text: #F0F0F0; --green: #3CAC3B; }
        body { background: var(--black); color: var(--text); font-family: 'Barlow', sans-serif; padding: 20px; }
        .controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        button { background: #333; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button#btn-play { background: var(--gold); color: black; }
        #chart-container { position: relative; height: 500px; margin-top: 40px; border-left: 2px solid #333; }
        .bar-wrapper { position: absolute; left: 0; width: 100%; height: 60px; transition: transform 0.6s ease-in-out; display: flex; align-items: center; }
        .bar { height: 45px; border-radius: 22px; display: flex; align-items: center; padding: 0 10px; transition: width 0.6s ease-in-out; justify-content: space-between; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .avatar { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #fff; margin-right: 10px; object-fit: cover; }
        .game-info { font-size: 13px; color: #aaa; margin-left: 10px; font-weight: bold; }
        .gain-pts { font-weight: 900; background: rgba(60,172,59,0.2); color: #7de87c; padding: 2px 8px; border-radius: 12px; }
    </style>
</head>
<body>
    <div class="controls">
        <button id="btn-prev">⏮️</button>
        <button id="btn-play">▶️ PLAY</button>
        <button id="btn-next">⏭️</button>
    </div>
    <div id="rodada-label" style="text-align:center; font-weight:bold; color:var(--gold); font-size: 1.5rem;">Aguardando...</div>
    <div id="chart-container"></div>

    <script>
        // 1. CARREGAR DADOS
        const S_DATA = JSON.parse(localStorage.getItem('bolao26_alldata'));
        const GAMES = JSON.parse(localStorage.getItem('bolao26_games'));
        const SETTINGS = { exact:10, result:5 }; // Ajuste conforme seu index.html se precisar

        if(!S_DATA || !GAMES) { alert("Dados não encontrados. Abra o Bolão primeiro!"); }
        
        const users = Object.values(S_DATA.users);
        const results = S_DATA.results;

        // 2. FUNÇÕES DE CÁLCULO REPLICADAS
        function getWDL(h,a) { if(h>a)return'H'; if(a>h)return'A'; return'D'; }
        
        function calcGamePoints(u, game) {
            const r = results[game.id];
            const b = (u.bets||{})[game.id];
            if (!r || !b || r.h === null) return 0;
            if (b.h === r.h && b.a === r.a) return SETTINGS.exact;
            if (getWDL(b.h,b.a) === getWDL(r.h,r.a)) return SETTINGS.result;
            return 0;
        }

        // 3. GERAR LINHA DO TEMPO (SNAPSHOTS)
        let snapshots = [];
        function gerarSnapshots() {
            let ranking = users.map(u => ({ 
                id: u.email, name: u.name, avatar: u.avatar, 
                color: `hsl(${Math.random()*360}, 70%, 60%)`, pts: 0 
            }));
            
            snapshots.push(JSON.parse(JSON.stringify(ranking)));

            GAMES.sort((a,b) => new Date(a.date) - new Date(b.date)).forEach(g => {
                if (results[g.id]?.status === 'finished') {
                    ranking.forEach(u => {
                        const userObj = S_DATA.users[u.id];
                        const pts = calcGamePoints(userObj, g);
                        u.pts += pts;
                        u.lastGain = pts;
                        u.lastGame = g.hCode + ' x ' + g.aCode;
                    });
                    snapshots.push(JSON.parse(JSON.stringify(ranking)));
                }
            });
        }

        // 4. RENDERIZAÇÃO
        let tick = 0;
        let isPlaying = false;
        let timer = null;
        const container = document.getElementById('chart-container');
        const barrasDOM = {};

        function initBars() {
            users.forEach(u => {
                const wrap = document.createElement('div');
                wrap.className = 'bar-wrapper';
                wrap.innerHTML = `<div class="bar" style="background:${barrasDOM[u.email]?.color || '#333'}"><div class="bar-info"><img class="avatar" src="${u.avatar||'taca.png'}"><span>${u.name}</span></div><span class="score-text">0</span></div><div class="game-info"></div>`;
                container.appendChild(wrap);
                barrasDOM[u.email] = wrap;
            });
        }

        function renderSnapshot(index) {
            const data = snapshots[index];
            const maxVal = Math.max(...data.map(d => d.pts), 1);
            const ordenado = [...data].sort((a, b) => b.pts - a.pts);
            
            document.getElementById('rodada-label').innerText = index === 0 ? 'Início' : `Jogo ${index}`;

            ordenado.forEach((u, i) => {
                const wrap = barrasDOM[u.id];
                const bar = wrap.querySelector('.bar');
                wrap.style.transform = `translateY(${i * 65}px)`;
                bar.style.width = `${(u.pts / maxVal) * 70}%`;
                bar.querySelector('.score-text').innerText = u.pts;
                wrap.querySelector('.game-info').innerHTML = index > 0 ? `<span class="gain-pts">+${u.lastGain}</span> ${u.lastGame}` : '';
            });
        }

        // 5. CONTROLES
        document.getElementById('btn-play').addEventListener('click', function() {
            if(isPlaying) { clearInterval(timer); isPlaying=false; this.innerText='▶️ PLAY'; }
            else { 
                isPlaying=true; this.innerText='⏸ PAUSE';
                timer = setInterval(() => { 
                    if(tick < snapshots.length-1) { tick++; renderSnapshot(tick); }
                    else { clearInterval(timer); isPlaying=false; this.innerText='▶️ PLAY'; }
                }, 1000);
            }
        });

        document.getElementById('btn-next').addEventListener('click', () => { if(tick < snapshots.length-1) { tick++; renderSnapshot(tick); } });
        document.getElementById('btn-prev').addEventListener('click', () => { if(tick > 0) { tick--; renderSnapshot(tick); } });

        // INICIALIZAÇÃO
        gerarSnapshots();
        initBars();
        renderSnapshot(0);
    </script>
</body>
</html>
